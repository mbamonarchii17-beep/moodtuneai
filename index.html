<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>MoodTune AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #060606;
    --surface:   #111111;
    --surface2:  #1a1a1a;
    --border:    #222222;
    --fire:      #ff5722;
    --fire-glow: #ff9100;
    --text:      #f5f5f5;
    --muted:     #777777;
    --radius:    16px;
    --font-head: 'Space Grotesk', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-head); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

  /* HEADER */
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(6,6,6,0.95); backdrop-filter: blur(16px); z-index: 100; flex-wrap: wrap; gap: 10px; }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .fire-wings { display: flex; align-items: center; width: 44px; height: 24px; }
  .wing { width: 20px; height: 20px; background: linear-gradient(45deg, var(--fire), var(--fire-glow)); filter: drop-shadow(0 0 8px var(--fire)); }
  .wing.left { border-radius: 0 100% 30% 100%; animation: flapLeft 3s ease-in-out infinite alternate; }
  .wing.right { border-radius: 100% 0 100% 30%; animation: flapRight 3s ease-in-out infinite alternate; }
  @keyframes flapLeft { 0% { transform: rotate(-25deg) scaleY(0.9); } 100% { transform: rotate(-5deg) scaleY(1.1); } }
  @keyframes flapRight { 0% { transform: rotate(25deg) scaleY(0.9); } 100% { transform: rotate(5deg) scaleY(1.1); } }
  .logo-text { font-weight: 700; font-size: 1.25rem; letter-spacing: -0.03em; }
  .logo-text span { color: transparent; background: linear-gradient(to right, var(--fire-glow), #fff); -webkit-background-clip: text; background-clip: text; }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .nav-tabs { display: flex; gap: 4px; background: var(--surface); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
  .nav-tab { background: none; border: none; color: var(--muted); font-family: var(--font-head); font-size: 0.82rem; font-weight: 600; padding: 7px 14px; cursor: pointer; border-radius: 6px; transition: all 0.2s; white-space: nowrap; }
  .nav-tab.active { background: var(--surface2); color: var(--fire-glow); border: 1px solid rgba(255,87,34,0.2); }
  .lang-panel { display: flex; gap: 4px; background: var(--surface); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
  .lang-btn { background: none; border: none; color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; padding: 6px 10px; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
  .lang-btn.active { background: var(--surface2); color: var(--fire-glow); border: 1px solid rgba(255,87,34,0.2); }

  /* PAGES */
  .page { display: none; flex: 1; flex-direction: column; }
  .page.active { display: flex; }

  /* TRENDING */
  .trending-section { max-width: 720px; margin: 0 auto; padding: 28px 20px 0; width: 100%; }
  .trending-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .trending-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .genre-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
  .genre-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.25s; text-decoration: none; display: block; }
  .genre-card:hover { border-color: var(--fire); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,87,34,0.12); }
  .genre-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--surface2); }
  .genre-thumb-placeholder { width: 100%; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; background: linear-gradient(135deg, var(--surface2), #0d0d0d); }
  .genre-info { padding: 10px 12px; }
  .genre-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fire-glow); margin-bottom: 3px; }
  .genre-track { font-size: 0.85rem; font-weight: 600; color: var(--text); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .genre-artist { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

  /* CHAT */
  .chat-container { max-width: 720px; margin: 0 auto; padding: 20px 20px 190px; width: 100%; flex: 1; display: flex; flex-direction: column; }
  .messages { display: flex; flex-direction: column; gap: 20px; }
  .msg { display: flex; gap: 14px; max-width: 85%; animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; border: 1px solid var(--border); }
  .msg.bot .avatar { background: linear-gradient(135deg,#222,#111); box-shadow: 0 0 10px rgba(255,87,34,0.15); border-color: rgba(255,87,34,0.3); }
  .msg.user .avatar { background: #ffffff10; }
  .bubble { padding: 14px 20px; border-radius: var(--radius); font-size: 0.98rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.bot .bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; color: #e0e0e0; }
  .msg.user .bubble { background: linear-gradient(135deg, var(--fire), #d84315); color: #fff; border-top-right-radius: 4px; box-shadow: 0 4px 12px rgba(255,87,34,0.2); }

  /* ANALYSIS CARD */
  .analysis-report { margin-top: 12px; background: rgba(255,255,255,0.01); border: 1px solid rgba(255,87,34,0.2); border-radius: 16px; overflow: hidden; }
  .report-header { background: linear-gradient(135deg, rgba(255,87,34,0.12), rgba(255,145,0,0.06)); padding: 14px 18px; border-bottom: 1px solid rgba(255,87,34,0.15); display: flex; align-items: center; gap: 10px; }
  .report-title { font-weight: 700; font-size: 1rem; color: var(--fire-glow); letter-spacing: -0.02em; margin: 0; border: none; padding: 0; }
  .mood-meta { padding: 12px 14px 8px; display: flex; flex-wrap: wrap; gap: 7px; }
  .mood-tag { display: inline-flex; align-items: baseline; gap: 5px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 5px 11px; }
  .mood-tag-label { color: var(--muted); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; }
  .mood-tag-val { color: var(--text); font-weight: 600; font-size: 0.8rem; }
  .tracks-header { padding: 6px 14px 8px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .tracks-header::after { content:''; flex:1; height:1px; background: var(--border); }
  .music-card-list { padding: 0 10px 12px; display: flex; flex-direction: column; gap: 5px; }
  .music-track { display: flex; align-items: center; gap: 0; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; text-decoration: none; color: #fff; transition: all 0.22s; overflow: hidden; }
  .music-track:hover { background: rgba(255,87,34,0.07); border-color: rgba(255,87,34,0.35); transform: translateX(3px); box-shadow: 0 4px 16px rgba(255,87,34,0.1); }
  .track-thumb-wrap { position: relative; flex-shrink: 0; width: 88px; height: 56px; }
  .track-thumb { width: 88px; height: 56px; object-fit: cover; display: block; }
  .track-thumb-placeholder { width: 88px; height: 56px; background: linear-gradient(135deg,#1a1a1a,#0d0d0d); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
  .track-num-badge { position: absolute; bottom: 3px; right: 3px; min-width: 18px; height: 18px; background: rgba(0,0,0,0.78); border-radius: 4px; font-size: 0.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center; color: #fff; padding: 0 4px; backdrop-filter: blur(4px); }
  .track-thumb-wrap { position: relative; flex-shrink: 0; }
  .track-info { flex: 1; min-width: 0; padding: 0 12px; }
  .track-title { font-weight: 600; font-size: 0.87rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f0f0f0; letter-spacing: -0.01em; }
  .track-artist { font-size: 0.72rem; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-link-icon { flex-shrink: 0; display: flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700; background: rgba(255,0,0,0.1); border-left: 1px solid rgba(255,255,255,0.05); color: #ff5555; padding: 0 14px; height: 56px; white-space: nowrap; transition: background 0.2s; }
  .music-track:hover .track-link-icon { background: rgba(255,0,0,0.2); }

  /* INFO CHAT RICH CARDS */
  .info-rich { margin-top: 4px; }
  .info-section { margin-bottom: 14px; }
  .info-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fire-glow); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .info-section-title::after { content:''; flex:1; height:1px; background: rgba(255,87,34,0.15); }
  .info-fact-row { display: flex; gap: 6px; margin-bottom: 5px; align-items: flex-start; }
  .info-fact-key { font-size: 0.78rem; color: var(--muted); min-width: 90px; flex-shrink: 0; }
  .info-fact-val { font-size: 0.85rem; color: var(--text); font-weight: 500; }
  .info-album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 6px; }
  .info-album-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 0.82rem; }
  .info-album-name { font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .info-album-year { font-size: 0.72rem; color: var(--muted); }
  .info-tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .info-tag { background: rgba(255,87,34,0.08); border: 1px solid rgba(255,87,34,0.2); color: var(--fire-glow); padding: 4px 10px; border-radius: 20px; font-size: 0.76rem; }
  .info-prose { font-size: 0.9rem; color: #d0d0d0; line-height: 1.65; }
  .info-stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0; }
  .info-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; text-align: center; }
  .info-stat-num { font-size: 1.1rem; font-weight: 700; color: var(--fire-glow); }
  .info-stat-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

  /* TYPING */
  .typing-loader { display: flex; align-items: center; gap: 4px; padding: 6px 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: wave 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.15s; } .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes wave { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* CONTROL PANEL */
  .control-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(6,6,6,0.93); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 14px 20px 18px; z-index: 99; }
  .quick-actions { max-width: 720px; margin: 0 auto 10px; display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .quick-actions::-webkit-scrollbar { display: none; }
  .recommend-chip { background: rgba(255,87,34,0.1); border: 1px solid rgba(255,87,34,0.3); color: var(--fire-glow); padding: 9px 18px; border-radius: 20px; font-size: 0.86rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
  .recommend-chip:hover:not(:disabled) { background: var(--fire); color: #fff; box-shadow: 0 0 14px rgba(255,87,34,0.4); transform: translateY(-1px); }
  .recommend-chip:disabled { background: #111; border-color: #222; color: #555; cursor: not-allowed; opacity: 0.6; font-weight: 400; }
  .input-box { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  .text-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-head); font-size: 1rem; padding: 13px 16px; resize: none; outline: none; min-height: 50px; max-height: 140px; line-height: 1.5; transition: border-color 0.2s; }
  .text-box:focus { border-color: var(--fire); }
  .action-btn { width: 50px; height: 50px; border-radius: var(--radius); background: linear-gradient(135deg, var(--fire), var(--fire-glow)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; transition: transform 0.2s; flex-shrink: 0; }
  .action-btn:hover { transform: scale(1.04); } .action-btn:active { transform: scale(0.96); }
  .action-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
  .action-btn svg { width: 20px; height: 20px; }
  .clear-session { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 20px; font-size: 0.78rem; cursor: pointer; margin: 8px auto 0; display: block; font-family: var(--font-mono); transition: all 0.2s; }
  .clear-session:hover { border-color: var(--fire); color: #fff; }

  /* GENRE MODAL */
  .genre-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .genre-modal-overlay.open { display: flex; }
  .genre-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; max-width: 520px; width: 100%; max-height: 82vh; overflow-y: auto; position: relative; animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1); }
  .genre-modal-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 2; display: flex; align-items: center; justify-content: space-between; }
  .genre-modal-title { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .genre-modal-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fire-glow); }
  .genre-modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .genre-modal-close:hover { border-color: var(--fire); color: #fff; }
  .genre-modal-list { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .genre-modal-loading { padding: 40px; text-align: center; color: var(--muted); font-size: 0.9rem; }
  .modal-track { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); padding: 10px 13px; border-radius: 10px; text-decoration: none; color: #fff; transition: all 0.2s; cursor: pointer; }
  .modal-track:hover { background: rgba(255,87,34,0.1); border-color: var(--fire); transform: translateX(3px); }
  .modal-track-num { width: 24px; height: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; font-size: 0.7rem; font-weight: 700; color: var(--fire-glow); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-track-thumb { width: 64px; height: 42px; border-radius: 7px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .modal-track-thumb-ph { width: 64px; height: 42px; border-radius: 7px; background: linear-gradient(135deg,#1e1e1e,#0d0d0d); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; border: 1px solid var(--border); }
  .modal-track-info { flex: 1; min-width: 0; }
  .modal-track-title { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-track-artist { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .modal-yt-btn { background: rgba(255,0,0,0.12); border: 1px solid rgba(255,0,0,0.3); color: #ff4444; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

  /* PAGE 2: INFO */
  .info-welcome { max-width: 720px; margin: 0 auto; padding: 36px 20px 0; width: 100%; }
  .info-welcome-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 26px 22px; margin-bottom: 16px; }
  .info-welcome-icon { font-size: 2.2rem; margin-bottom: 10px; }
  .info-welcome-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
  .info-welcome-sub { color: var(--muted); font-size: 0.88rem; line-height: 1.55; }
  .info-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .info-chip { background: rgba(255,87,34,0.08); border: 1px solid rgba(255,87,34,0.2); color: var(--fire-glow); padding: 7px 13px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .info-chip:hover { background: rgba(255,87,34,0.16); border-color: var(--fire); }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="fire-wings"><div class="wing left"></div><div class="wing right"></div></div>
    <div class="logo-text">MoodTune<span>AI</span></div>
  </div>
  <div class="header-right">
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="page-mood">🎵 Mood Chat</button>
      <button class="nav-tab" data-page="page-info">🎤 Music Info</button>
    </div>
    <div class="lang-panel" id="lang-panel">
      <button class="lang-btn active" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" 
    </div>
  </div>
</header>

<!-- PAGE 1: MOOD CHAT -->
<div class="page active" id="page-mood">
  <div class="trending-section" id="trending-section">
    <div class="trending-title">🔥 Trending hozir — bosing va tinglang</div>
    <div class="genre-grid" id="genre-grid"></div>
  </div>
  <div class="chat-container">
    <div class="messages" id="chat-stream"></div>
  </div>
  <div class="control-panel">
    <div class="quick-actions">
      <button class="recommend-chip" id="quick-rec-btn" disabled>🔒 Kamida 2 ta javob bering</button>
    </div>
    <div class="input-box">
      <textarea class="text-box" id="user-input" rows="1" placeholder="Javobingizni erkin yozing..."></textarea>
      <button class="action-btn" id="send-trigger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <button class="clear-session" id="reset-trigger" data-uz="Suhbatni yangilash 🔄" data-ru="Обновить чат 🔄" data-en="Reset Chat 🔄">Suhbatni yangilash 🔄</button>
  </div>
</div>

<!-- PAGE 2: MUSIC INFO -->
<div class="page" id="page-info">
  <div class="info-welcome" id="info-welcome">
    <div class="info-welcome-card">
      <div class="info-welcome-icon">🎤</div>
      <div class="info-welcome-title" id="info-welcome-title">Music Info Assistant</div>
      <div class="info-welcome-sub" id="info-welcome-sub">Artist, albom yoki qo'shiq haqida biror narsa so'rang.</div>
      <div class="info-chips" id="info-chips">
        <span class="info-chip" onclick="infoAskChip('The Weeknd')">The Weeknd</span>
        <span class="info-chip" onclick="infoAskChip('Eminem')">Eminem</span>
        <span class="info-chip" onclick="infoAskChip('Billie Eilish')">Billie Eilish</span>
        <span class="info-chip" onclick="infoAskChip('Drake')">Drake</span>
        <span class="info-chip" onclick="infoAskChip('Скриптонит')">Скриптонит</span>
        <span class="info-chip" onclick="infoAskChip('BAKR')">BAKR</span>
      </div>
    </div>
  </div>
  <div class="chat-container">
    <div class="messages" id="info-stream"></div>
  </div>
  <div class="control-panel">
    <div class="input-box">
      <textarea class="text-box" id="info-input" rows="1" placeholder="Artist, albom yoki qo'shiq haqida so'rang..." id="info-input-field"></textarea>
      <button class="action-btn" id="info-send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>

const BACKEND_URL = "https://moodtune-backend.onrender.com";

// ── CLAUDE API ──────────────────────────────────────────────────────────────
async function claudeCall(history, system, maxTok = 2000) {
  const msgs = history.map(m => ({
    role: m.role === "assistant" ? "assistant" : "user",
    content: m.content
  }));

  const res = await fetch(BACKEND_URL + "/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      system: system,
      messages: msgs,
      max_tokens: maxTok
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error("Server xatosi " + res.status + ": " + (err.error || res.statusText));
  }

  const data = await res.json();
  if (data.error) {
    throw new Error("Claude xatolik: " + (data.error.message || JSON.stringify(data.error)));
  }
  if (!data.content || !data.content[0]) throw new Error("Claude: javob kelmadi.");
  return data.content[0].text;
}

function parseMoodReply(raw) {
  if (!raw.includes("[REPORT_START]")) {
    addBubble(moodStream, "bot", raw);
    sendBtn.disabled = false;
    return;
  }
  try {
    const seg = raw.split("[REPORT_START]")[1].split("[REPORT_END]")[0];
    let analysis = seg, tracks = null;
    if (seg.includes("[TRACKS_START]")) {
      const parts = seg.split("[TRACKS_START]");
      analysis = parts[0];
      let jsonStr = parts[1].split("[TRACKS_END]")[0].trim();
      jsonStr = jsonStr.replace(/```json|```/g, "").trim();
      tracks = JSON.parse(jsonStr);
    }

    // Parse analysis fields from markdown-like text
    function extractField(text, label) {
      const re = new RegExp("\\*\\*" + label + ":\\*\\*\\s*(.+)", "i");
      const m = text.match(re);
      return m ? m[1].trim() : null;
    }
    const mood     = extractField(analysis, "Mood");
    const style    = extractField(analysis, "Musiqa uslubi");
    const genres   = extractField(analysis, "Janrlar");

    const listId = "tl-" + Date.now();

    // Build mood meta tags
    let metaHtml = `<div class="mood-meta">`;
    if (mood)   metaHtml += `<span class="mood-tag"><span class="mood-tag-label">😌 Kayfiyat</span><span class="mood-tag-val">${mood}</span></span>`;
    if (style)  metaHtml += `<span class="mood-tag"><span class="mood-tag-label">🎨 Uslub</span><span class="mood-tag-val">${style}</span></span>`;
    if (genres) metaHtml += `<span class="mood-tag"><span class="mood-tag-label">🎵 Janr</span><span class="mood-tag-val">${genres}</span></span>`;
    metaHtml += `</div>`;

    const html = `<div class="analysis-report">
      <div class="report-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--fire-glow);flex-shrink:0"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
        <span class="report-title">Mood Analysis & Music Picks</span>

      <div class="music-card-list" id="${listId}"></div>
    </div>`;
    addBubble(moodStream, "bot", html, true);

    if (tracks && Array.isArray(tracks)) {
      const container = document.getElementById(listId);
      tracks.forEach((t, i) => {
        const hasRealId = t.ytId && t.ytId !== "SEARCH" && t.ytId.length === 11;

          ? `https://www.youtube.com/watch?v=${t.ytId}`
          : `https://www.youtube.com/results?search_query=${encodeURIComponent(t.search || t.title)}`;

        // Parse "Artist - Song" format

        const songName   = parts.length > 1 ? parts.slice(1).join(" - ").trim() : t.title;

        const card = document.createElement("a");
        card.className = "music-track";
        card.href = ytUrl;
        card.target = "_blank";
        card.rel = "noopener noreferrer";

          <div class="track-thumb-wrap" style="width:88px;height:56px;flex-shrink:0;position:relative">
            ${hasRealId
              ? `<img id="${thumbId}" src="https://img.youtube.com/vi/${t.ytId}/mqdefault.jpg"
                   style="width:88px;height:56px;object-fit:cover;display:block"
                   loading="lazy"

  } catch(e) {

    addBubble(moodStream, "bot", raw);
  }
  sendBtn.disabled = false;
}

async function sendMood(custom = null) {
  const text = custom || userInput.value.trim();
  if (!text) return;
  if (!custom) { moodMsgCount++; updateRecBtn(); userInput.value = ""; userInput.style.height = "auto"; }
  sendBtn.disabled = true;
  addBubble(moodStream, "user", text);
  showTyping(moodStream, "mood-typing");
  moodHistory.push({ role:"user", content: text });
  try {
    const langInstruction = currentLang === "ru" ? "ВАЖНО: Отвечай ТОЛЬКО на русском языке!" 
      : currentLang === "en" ? "IMPORTANT: Reply ONLY in English!"
      : "MUHIM: FAQAT o'zbek tilida javob ber!";
    const reply = await claudeCall(moodHistory, MOOD_SYSTEM + "\n\n" + langInstruction);
    moodHistory.push({ role:"assistant", content: reply });
    hideTyping("mood-typing");
    parseMoodReply(reply);
  } catch(e) {
    hideTyping("mood-typing");
    const errMsg = e.message || "Noma'lum xatolik";
    addBubble(moodStream, "bot", "⚠️ " + errMsg);
    sendBtn.disabled = false;
  }
}

function initMoodSession() {
  moodStream.innerHTML = "";
  moodHistory = [];
  moodMsgCount = 0;
  sendBtn.disabled = false;
  updateRecBtn();
  const greet = GREETINGS[currentLang];
  addBubble(moodStream, "bot", greet);
  moodHistory.push({ role:"assistant", content: greet });
}

sendBtn.addEventListener("click", () => sendMood());
userInput.addEventListener("keydown", e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMood(); } });
userInput.addEventListener("input", () => { userInput.style.height="auto"; userInput.style.height=Math.min(userInput.scrollHeight,140)+"px"; });
document.getElementById("reset-trigger").addEventListener("click", initMoodSession);
recBtn.addEventListener("click", () => { if (moodMsgCount >= 2) sendMood(REC_TRIGGERS[currentLang]); });

function renderInfoCard(data) {

    </div>
  </div>`;

  // Stats row
  if (data.stats && data.stats.length) {
    html += `<div class="info-stat-row">`;

    });

  // Facts
  if (data.facts && data.facts.length) {
    html += `<div class="info-section"><div class="info-section-title"><span>📋</span> Asosiy ma'lumotlar</div>`;
    data.facts.forEach(f => {
      html += `<div class="info-fact-row"><span class="info-fact-key">${f.key}</span><span class="info-fact-val">${f.val}</span></div>`;
    });
    html += `</div>`;
  }

  // Sections
  if (data.sections && data.sections.length) {
    data.sections.forEach(sec => {
      html += `<div class="info-section"><div class="info-section-title"><span>${sec.icon||"📌"}</span> ${sec.title}</div>`;
      if (sec.type === "prose") {
        html += `<div class="info-prose">${(sec.content||"").replace(/\n/g,"<br>")}</div>`;
      } else if (sec.type === "tags" && Array.isArray(sec.content)) {

          const ytUrl = hasId
            ? `https://www.youtube.com/watch?v=${tr.ytId}`

  }

  html += `</div>`;
  return html;
}

// Levenshtein distance hisoblash
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

// Lokal ma'lumotlar bazasidan qidirish (to'g'ri va fuzzy)
function findArtistInDB(text) {
  const norm = text.toLowerCase().trim();

  // 1. Avval aniq moslikni tekshir (substring match)
  let best = null;
  let bestLen = 0;
  for (const artist of MUSIC_DB) {
    for (const alias of artist.aliases) {
      const a = alias.toLowerCase();
      if (norm.includes(a) && a.length > bestLen) {
        best = artist;
        bestLen = a.length;
      }
    }
  }
  if (best) return { artist: best, fuzzy: false };

  // 2. Fuzzy matching — eng yaqin aliasni top
  // Foydalanuvchi yozgan so'zlarni alohida ajratib, har bir alias bilan solishtir
  const words = norm.split(/\s+/);
  let closestArtist = null;
  let closestDist = Infinity;
  const MAX_DIST = 3; // maksimal ruxsat etilgan xato soni

  for (const artist of MUSIC_DB) {
    for (const alias of artist.aliases) {
      const aliasWords = alias.toLowerCase().split(/\s+/);
      // Alias so'zlari soni bilan foydalanuvchi so'zlari orasida oyna siljitib solishtir
      for (let i = 0; i <= words.length - aliasWords.length; i++) {
        const slice = words.slice(i, i + aliasWords.length).join(" ");
        const dist = levenshtein(slice, alias.toLowerCase());
        if (dist < closestDist) {
          closestDist = dist;
          closestArtist = artist;
        }
      }
      // Butun matni ham tekshir
      const dist = levenshtein(norm, alias.toLowerCase());
      if (dist < closestDist) {
        closestDist = dist;
        closestArtist = artist;
      }
    }
  }

  if (closestArtist && closestDist <= MAX_DIST) {
    return { artist: closestArtist, fuzzy: true, dist: closestDist };
  }

  return null;
}

async function infoAsk(text) {
  hideInfoWelcome();
  addBubble(infoStream, "user", text);
  infoSendBtn.disabled = true;
  showTyping(infoStream, "info-typing");

  // Lokal bazadan qidirish
  const found = findArtistInDB(text);

  // Sun'iy kechikish (UX uchun)
  setTimeout(() => {
    hideTyping("info-typing");
    if (found) {
      let prefix = "";
      if (found.fuzzy) {
        prefix = `<div style="font-size:0.8rem;color:var(--muted);margin-bottom:10px;padding:6px 10px;background:rgba(255,145,0,0.07);border-radius:8px;border:1px solid rgba(255,145,0,0.2)">
          🔍 "<b>${text}</b>" topilmadi — siz <b>${found.artist.name}</b> ni nazarda tutgan bo'lsangiz kerak?
        </div>`;
      }
      addBubble(infoStream, "bot", prefix + renderInfoCard(found.artist), true);
    } else {
      addBubble(infoStream, "bot", renderNotFound(text), true);
    }
    infoSendBtn.disabled = false;
  }, 400);
}

function infoSend() {
  const text = infoInput.value.trim();
  if (!text) return;
  infoInput.value = ""; infoInput.style.height = "auto";
  infoAsk(text);
}

infoSendBtn.addEventListener("click", infoSend);
